<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Events - Happenings</title>

    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/css/cards.css"/>
</head>

<body>

<header>
    <h1>Happenings</h1>

    <nav>
        <a href="/dashboard">Home</a>
        <a href="/allEvents" class="active">All Events</a>
        <a href="/recommendations">Recommended</a>
        <a href="/saved">Saved</a>
        <a href="/myEvents">My Events</a>
        <a href="/profile">
            <img src="/images/profileEmpty.png" class="profile-pic" />
        </a>
    </nav>
</header>

<main>

    <div class="events-toolbar">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="eventSearch"
                   placeholder="Search for events..."
                   oninput="handleSearch()">
        </div>
    </div>

    <div class="category-filters">
        <button class="cat-filter active" onclick="setCategory('all', this)">All</button>
        <button class="cat-filter music" onclick="setCategory('music', this)">Music & Art</button>
        <button class="cat-filter sports" onclick="setCategory('sports', this)">Sports</button>
        <button class="cat-filter food" onclick="setCategory('food', this)">Food & Drink</button>
        <button class="cat-filter technology" onclick="setCategory('technology', this)">Technology</button>
        <button class="cat-filter community" onclick="setCategory('community', this)">Community</button>
    </div>

    <div class="allevents-grid" id="eventsGrid"></div>

    <div class="pagination-bar">
        <div class="pagination" id="pagination"></div>
    </div>

</main>

<script>
    const CARDS_PER_PAGE = 36;

    let currentPage = 1;
    let currentCategory = 'all';
    let currentSort = 'default';
    let allEvents = [];
    let savedEventIds = new Set();

    // const API_URL = "https://capstone-project-infinite-loop-f0nr.onrender.com/api/events";
    const API_URL = "http://localhost:8080/api/events";

    // =========================
    // LOAD SAVED IDS
    // =========================
    async function loadSavedEventIds() {
        const userId = localStorage.getItem("userId");

        if (!userId) return;

        const res = await fetch(
            `https://capstone-project-infinite-loop-f0nr.onrender.com/api/saved-events/user/${userId}`
        );

        const data = await res.json();

        savedEventIds = new Set(data.map(e => e.eventId));
    }

    // =========================
    // LOAD EVENTS
    // =========================
    async function loadEvents() {
        const response = await fetch(API_URL);
        const data = await response.json();

        allEvents = data.map(e => ({
            eventId: e.eventId,
            title: e.title,
            description: e.description,
            category: mapCategory(e.categoryId),
            categoryLabel: mapCategoryLabel(e.categoryId),
            image: mapCategoryImage(e.categoryId),
            date: new Date(e.eventDatetime).toDateString(),
            location: e.location || "TBD",
            timestamp: new Date(e.eventDatetime).getTime()
        }));

        await loadSavedEventIds();

        filterEvents();
    }

    // =========================
    // RENDER
    // =========================
    function renderEvents(events) {
        const grid = document.getElementById('eventsGrid');
        grid.innerHTML = '';

        events.forEach(event => {
            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML =
                '<div class="card-header">' +
                '<a class="event-name">' + event.title + '</a>' +
                '<p class="event-type"><span class="badge ' + event.category + '">' +
                event.categoryLabel + '</span></p>' +
                '</div>' +

                '<div class="image-container">' +
                '<img src="' + event.image + '">' +

                '<button class="card-save-btn" onclick="toggleSave(event, ' + event.eventId + ')">' +
                (savedEventIds.has(event.eventId) ? '❤️' : '🤍') +
                '</button>' +

                '</div>' +

                '<div class="card-details">' +
                '<p>' + event.description + '</p>' +
                '<p>📅 ' + event.date + '</p>' +
                '<p>📍 ' + event.location + '</p>' +
                '</div>';

            grid.appendChild(card);
        });
    }

    // =========================
    // SAVE / UNSAVE
    // =========================
    async function toggleSave(e, eventId) {
        e.stopPropagation();

        const userId = localStorage.getItem("userId");

        if (savedEventIds.has(eventId)) {
            await fetch(
                `https://capstone-project-infinite-loop-f0nr.onrender.com/api/saved-events?userId=${userId}&eventId=${eventId}`,
                { method: "DELETE" }
            );
            savedEventIds.delete(eventId);
        } else {
            await fetch(
                `https://capstone-project-infinite-loop-f0nr.onrender.com/api/saved-events`,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId: parseInt(userId), eventId })
                }
            );
            savedEventIds.add(eventId);
        }

        filterEvents();
    }

    // =========================
    // FILTER
    // =========================
    function filterEvents() {
        renderEvents(allEvents);
    }

    // =========================
    // MAPPERS
    // =========================
    function mapCategory(id) {
        switch (id) {
            case 1: return "music";
            case 2: return "sports";
            case 3: return "technology";
            case 4: return "food";
            case 5: return "community";
            default: return "community";
        }
    }

    function mapCategoryLabel(id) {
        switch (id) {
            case 1: return "Music & Art";
            case 2: return "Sports";
            case 3: return "Technology";
            case 4: return "Food & Drink";
            case 5: return "Community";
            default: return "Community";
        }
    }

    function mapCategoryImage(id) {
        switch (id) {
            case 1: return "/images/musicCard.png";
            case 2: return "/images/sportsCard.jpg";
            case 3: return "/images/TechnologyCard.png";
            case 4: return "/images/FoodDrinkCard.jpg";
            case 5: return "/images/CommunityCard.png";
            default: return "/images/login-bg.jpg";
        }
    }

    document.addEventListener('DOMContentLoaded', loadEvents);
</script>

</body>
</html>
