<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard - Happenings</title>

    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/css/cards.css" />
</head>

<body>

<header>
    <h1>Happenings</h1>
    <nav>
        <a href="/dashboard" class="active">Home</a>
        <a href="/allEvents">All Events</a>
        <a href="/recommendations">Recommended</a>
        <a href="/saved">Saved</a>
        <a href="/myEvents">My Events</a>
        <a href="/profile">
            <img src="/images/profileEmpty.png" class="profile-pic" />
        </a>
    </nav>
</header>

<main>

    <div class="home-banner">
        <h2>Welcome back!</h2>
        <p>Here's what's happening around you.</p>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">Saved Events</span>
            <a href="/saved" class="see-all">See all →</a>
        </div>
        <div class="cards-grid" id="savedEventsContainer"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">Recently Added</span>
            <a href="/allEvents" class="see-all">See all →</a>
        </div>
        <div class="cards-grid" id="cardsContainer"></div>
    </div>

</main>

<script>
    // const API_URL = "https://capstone-project-infinite-loop-f0nr.onrender.com/api/events";
    const API_URL = "http://localhost:8080/api/events";

    const cardsContainer = document.getElementById('cardsContainer');
    const savedEventsContainer = document.getElementById('savedEventsContainer');

    // ----------------------------
    // LOAD EVENTS FROM BACKEND
    // ----------------------------
    async function loadDashboardEvents() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            const formatted = data.map(e => ({
                title: e.title,
                description: e.description,
                category: mapCategory(e.categoryId),
                categoryLabel: mapCategoryLabel(e.categoryId),
                image: mapCategoryImage(e.categoryId),
                date: new Date(e.eventDatetime).toDateString(),
                location: "Location TBD"
            }));

            // Recent = first 6 events
            renderCards(formatted.slice(0, 6), cardsContainer);

            // Saved (temporary fallback until backend is built)
            renderCards(formatted.slice(0, 3), savedEventsContainer);

            enableDragScroll(cardsContainer);
            enableDragScroll(savedEventsContainer);

        } catch (err) {
            console.error(err);
            cardsContainer.innerHTML = "<p style='color:white'>Failed to load events</p>";
        }
    }

    // ----------------------------
    // CATEGORY MAPPING
    // ----------------------------
    function mapCategory(id) {
        switch(id) {
            case 1: return "music";
            case 2: return "sports";
            case 3: return "technology";
            case 4: return "food";
            case 5: return "community";
            default: return "community";
        }
    }

    function mapCategoryLabel(id) {
        switch(id) {
            case 1: return "Music & Art";
            case 2: return "Sports";
            case 3: return "Technology";
            case 4: return "Food & Drink";
            case 5: return "Community";
            default: return "Community";
        }
    }

    function mapCategoryImage(id) {
        switch (id) {
            case 1: return "/images/musicCard.png";
            case 2: return "/images/sportsCard.jpg";
            case 3: return "/images/TechnologyCard.png";
            case 4: return "/images/FoodDrinkCard.jpg";
            case 5: return "/images/CommunityCard.png";
            default: return "/images/login-bg.jpg";
        }
    }

    // ----------------------------
    // RENDER CARDS
    // ----------------------------
    function renderCards(data, container) {
        container.innerHTML = '';

        data.forEach(event => {
            const card = document.createElement('div');
            card.className = 'card';

            const eventData = {
                title:         event.title,
                description:   event.description,
                category:      event.category,
                categoryLabel: event.categoryLabel,
                image:         event.image,
                date:          event.date,
                location:      event.location
            };

            card.addEventListener('click', function(e) {
                if (e.target.classList.contains('card-save-btn')) return;
                Modal.open(eventData);
            });

            card.innerHTML =
                '<div class="card-header">' +
                '<a class="event-name">' + event.title + '</a>' +
                '<p class="event-type"><span class="badge ' + event.category + '">' + event.categoryLabel + '</span></p>' +
                '</div>' +
                '<div class="image-container">' +
                '<img src="' + event.image + '">' +
                '<button class="card-save-btn" onclick="toggleSave(this)">🤍</button>' +
                '</div>' +
                '<div class="card-details">' +
                '<p class="desc">' + event.description + '</p>' +
                '<p>📅 ' + event.date + '</p>' +
                '<p>📍 ' + event.location + '</p>' +
                '</div>';

            container.appendChild(card);
        });
    }

    function toggleSave(btn) {
        btn.textContent = btn.textContent === '🤍' ? '❤️' : '🤍';
    }

    // ----------------------------
    // SCROLL
    // ----------------------------
    function enableDragScroll(grid) {
        let isDown = false;
        let startX;
        let scrollLeft;
        let hasDragged = false;

        grid.addEventListener('mousedown', e => {
            isDown = true;
            hasDragged = false;
            grid.style.cursor = 'grabbing';
            startX = e.pageX - grid.offsetLeft;
            scrollLeft = grid.scrollLeft;
        });

        grid.addEventListener('mouseleave', () => {
            isDown = false;
            grid.style.cursor = 'grab';
        });

        grid.addEventListener('mouseup', () => {
            isDown = false;
            grid.style.cursor = 'grab';
        });

        grid.addEventListener('mousemove', e => {
            if (!isDown) return;
            e.preventDefault();
            hasDragged = true;
            grid.scrollLeft = scrollLeft - (e.pageX - grid.offsetLeft - startX);
        });

        grid.style.cursor = 'grab';

        grid.addEventListener('click', e => {
            if (hasDragged) {
                e.stopPropagation();
                hasDragged = false;
            }
        }, true);
    }

    const Modal = (() => {
        function init() {
            const modal = document.createElement('div');
            modal.id = 'cardModal';
            modal.className = 'card-modal-overlay';
            modal.innerHTML =
                '<div class="card-modal">' +
                '<div class="card-modal-header">' +
                '<h2 id="modalTitle"></h2>' +
                '<p class="event-type"><span id="modalBadge"></span></p>' +
                '</div>' +
                '<div class="card-modal-image">' +
                '<img id="modalImage" src="" alt="">' +
                '<button class="card-save-btn" id="modalSaveBtn" onclick="toggleSave(this)">🤍</button>' +
                '</div>' +
                '<div class="card-modal-body">' +
                '<p id="modalDesc"></p>' +
                '<div class="card-modal-meta">' +
                '<p id="modalDate"></p>' +
                '<p id="modalLocation"></p>' +
                '</div>' +
                '</div>' +
                '</div>';
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) Modal.close();
            });
        }

        function open(event) {
            document.getElementById('modalTitle').textContent    = event.title || '';
            document.getElementById('modalDesc').textContent     = event.description || '';
            document.getElementById('modalDate').textContent     = '📅 ' + (event.date || '');
            document.getElementById('modalLocation').textContent = '📍 ' + (event.location || '');
            document.getElementById('modalImage').src            = event.image || '';
            document.getElementById('modalImage').alt            = event.title || '';
            const badge = document.getElementById('modalBadge');
            badge.textContent = event.categoryLabel || '';
            badge.className   = 'badge ' + (event.category || '');
            document.getElementById('modalSaveBtn').textContent = '🤍';
            document.getElementById('cardModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function close() {
            document.getElementById('cardModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', init);
        return { open, close };
    })();

    // ----------------------------
    // INIT
    // ----------------------------
    document.addEventListener('DOMContentLoaded', loadDashboardEvents);
</script>

</body>
</html>
