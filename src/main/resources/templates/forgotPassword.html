<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password - Happenings</title>

    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/css/login-register.css" />
</head>

<body class="page-login">

<main id="loginPage">

    <section class="welcome-section">
        <h1>Happenings</h1>
        <p>Enter your email and we'll send you a reset link.</p>
    </section>

    <section class="login-section">

        <h3>Forgot Your Password?</h3>

        <form id="forgotForm">

            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email address"
                    required
            />

            <button type="submit">Send Reset Link</button>

            <p id="resetMessage"></p>

        </form>

        <p class="register-link">
            Remembered it? <a href="login.html">Back to Login</a>
        </p>

    </section>

</main>

<script>
    // 🔥 CHANGE THIS LATER if your backend endpoint differs
    const API_URL = "https://capstone-project-infinite-loop-f0nr.onrender.com/api/auth/forgot-password";

    document.getElementById("forgotForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const messageEl = document.getElementById("resetMessage");

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email })
            });

            if (!response.ok) {
                throw new Error("Request failed");
            }

            messageEl.style.color = "lightgreen";
            messageEl.innerText = "Reset link sent (if email exists).";

        } catch (err) {
            console.error(err);
            messageEl.style.color = "red";
            messageEl.innerText = "Error sending reset link.";
        }
    });
</script>

</body>
</html>
