<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Happenings</title>

    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <link rel="stylesheet" type="text/css" href="/css/login-register.css">
</head>

<body class="page-login">

<main id="loginPage">

    <section class="welcome-section">
        <h1>Welcome Back</h1>
        <p>Sign in to see what's Happenings.</p>
    </section>

    <section class="login-section">

        <h3>Login to Your Account</h3>

        <form id="loginForm">

            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
                    required
            />

            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
            />

            <p class="forgot-password-link">
                <a href="/forgotPassword">Forgot password?</a>
            </p>

            <button type="submit">Log In</button>

            <p id="loginMessage"></p>

        </form>

        <p class="register-link">
            Don't have an account?
            <a href="/register">Sign up</a>
        </p>

    </section>

</main>

<script>
    const API_URL = "https://capstone-project-infinite-loop-f0nr.onrender.com/api/auth/login";

    const form = document.getElementById("loginForm");
    const message = document.getElementById("loginMessage");

    form.addEventListener("submit", async function (e) {
        e.preventDefault(); // prevent page reload

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            if (!response.ok) {
                message.style.color = "red";
                message.textContent = "Invalid login credentials";
                return;
            }

            const user = await response.json();

            // 🔥 STORE USER ID (CRITICAL FIX)
            localStorage.setItem("userId", user.id);

            message.style.color = "green";
            message.textContent = "Login successful!";

            // redirect after short delay
            setTimeout(() => {
                window.location.href = "/dashboard";
            }, 500);

        } catch (err) {
            console.error(err);
            message.style.color = "red";
            message.textContent = "Server error. Try again.";
        }
    });
</script>

</body>
</html>
