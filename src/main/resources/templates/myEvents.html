<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Events - Happenings</title>

    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/css/cards.css" />
    <link rel="stylesheet" type="text/css" href="/css/myEvents.css" />
</head>

<body>

<header>
    <h1>Happenings</h1>

    <nav>
        <a href="/dashboard">Home</a>
        <a href="/allEvents">All Events</a>
        <a href="/recommendations">Recommended</a>
        <a href="/saved">Saved</a>
        <a href="/myEvents" class="active">My Events</a>
        <a href="/profile">
            <img src="/images/profileEmpty.png" class="profile-pic" />
        </a>
    </nav>
</header>

<main>

    <div class="page-header">
        <div class="page-header-row">
            <h2>My Events</h2>

            <a href="/createEvent" class="create-btn">
                Create Event
            </a>
        </div>
    </div>

    <div class="myevents-section">
        <div class="allevents-grid" id="myEventsGrid"></div>
    </div>

</main>

<script>
    const API_URL = "https://capstone-project-infinite-loop-f0nr.onrender.com/api/events/mine";

    async function loadMyEvents() {
        try {
            const res = await fetch(API_URL);

            if (!res.ok) {
                throw new Error("Failed to fetch events");
            }

            const data = await res.json();

            renderMyEvents(data);

        } catch (err) {
            console.error(err);

            document.getElementById('myEventsGrid').innerHTML =
                "<p style='color:white'>Unable to load your events.</p>";
        }
    }

    function mapCategory(id) {
        switch (id) {
            case 1: return "music";
            case 2: return "sports";
            case 3: return "technology";
            case 4: return "food";
            case 5: return "community";
            default: return "community";
        }
    }

    function mapCategoryLabel(id) {
        switch (id) {
            case 1: return "Music & Art";
            case 2: return "Sports";
            case 3: return "Technology";
            case 4: return "Food & Drink";
            case 5: return "Community";
            default: return "Community";
        }
    }

    function mapCategoryImage(id) {
        switch (id) {
            case 1: return "/images/musicCard.png";
            case 2: return "/images/sportsCard.jpg";
            case 3: return "/images/TechnologyCard.png";
            case 4: return "/images/FoodDrinkCard.jpg";
            case 5: return "/images/CommunityCard.png";
            default: return "/images/login-bg.jpg";
        }
    }

    function renderMyEvents(events) {
        const grid = document.getElementById('myEventsGrid');
        grid.innerHTML = '';

        if (!events || events.length === 0) {
            grid.innerHTML = "<p style='color:white'>You have no events yet.</p>";
            return;
        }

        events.forEach(event => {
            const card = document.createElement('div');
            card.className = 'card';

            const eventData = {
                title:         event.title || 'Untitled',
                description:   event.description || '',
                category:      mapCategory(event.categoryId),
                categoryLabel: mapCategoryLabel(event.categoryId),
                image:         mapCategoryImage(event.categoryId),
                date:          new Date(event.eventDatetime).toDateString(),
                location:      event.location || 'TBD'
            };

            card.addEventListener('click', function(e) {
                if (e.target.classList.contains('card-action-btn')) return;
                if (e.target.classList.contains('card-save-btn')) return;
                Modal.open(eventData);
            });

            card.innerHTML =
                '<div class="card-header">' +
                '<a class="event-name">' + (event.title || 'Untitled') + '</a>' +
                '<p class="event-type"><span class="badge ' + mapCategory(event.categoryId) + '">' + mapCategoryLabel(event.categoryId) + '</span></p>' +
                '</div>' +
                '<div class="image-container">' +
                '<img src="' + mapCategoryImage(event.categoryId) + '">' +
                '<button class="card-save-btn" onclick="toggleSave(this)">🤍</button>' +
                '</div>' +
                '<div class="card-details">' +
                '<p class="desc">' + (event.description || '') + '</p>' +
                '<p>📅 ' + new Date(event.eventDatetime).toDateString() + '</p>' +
                '<p>📍 ' + (event.location || 'TBD') + '</p>' +
                '</div>' +
                '<div class="card-actions">' +
                '<button class="card-action-btn edit-btn">Edit</button>' +
                '<button class="card-action-btn delete-btn">Delete</button>' +
                '</div>';

            grid.appendChild(card);
        });
    }

    function toggleSave(btn) {
        btn.textContent = btn.textContent === '🤍' ? '❤️' : '🤍';
    }

    const Modal = (() => {
        function init() {
            const modal = document.createElement('div');
            modal.id = 'cardModal';
            modal.className = 'card-modal-overlay';
            modal.innerHTML =
                '<div class="card-modal">' +
                '<div class="card-modal-header">' +
                '<h2 id="modalTitle"></h2>' +
                '<p class="event-type"><span id="modalBadge"></span></p>' +
                '</div>' +
                '<div class="card-modal-image">' +
                '<img id="modalImage" src="" alt="">' +
                '</div>' +
                '<div class="card-modal-body">' +
                '<p id="modalDesc"></p>' +
                '<div class="card-modal-meta">' +
                '<p id="modalDate"></p>' +
                '<p id="modalLocation"></p>' +
                '</div>' +
                '</div>' +
                '</div>';
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) Modal.close();
            });
        }

        function open(event) {
            document.getElementById('modalTitle').textContent    = event.title || '';
            document.getElementById('modalDesc').textContent     = event.description || '';
            document.getElementById('modalDate').textContent     = '📅 ' + (event.date || '');
            document.getElementById('modalLocation').textContent = '📍 ' + (event.location || '');
            document.getElementById('modalImage').src            = event.image || '';
            document.getElementById('modalImage').alt            = event.title || '';
            const badge = document.getElementById('modalBadge');
            badge.textContent = event.categoryLabel || '';
            badge.className   = 'badge ' + (event.category || '');
            document.getElementById('cardModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function close() {
            document.getElementById('cardModal').classList.remove('active');
            document.body.style.overflow = '';
        }


        document.addEventListener('DOMContentLoaded', init);
        return { open, close };
    })();

    document.addEventListener('DOMContentLoaded', loadMyEvents);
</script>

</body>
</html>
