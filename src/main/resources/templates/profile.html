<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile - Happenings</title>

    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/css/profile.css" />
</head>

<body>

<header>
    <h1>Happenings</h1>

    <nav>
        <a href="/dashboard">Home</a>
        <a href="/allEvents">All Events</a>
        <a href="/saved">Saved</a>
        <a href="/myEvents">My Events</a>
        <a href="/logout">Log out</a>
    </nav>
</header>

<main>

    <div class="profile-container">
        <div class="profile-card">

            <h2>Your Profile</h2>

            <p class="profile-subtitle">
                Update your interests to find better events.
            </p>

            <form id="profileForm">

                <div class="profile-categories">

                    <p>Select your categories:</p>

                    <label>
                        <input type="checkbox" name="categories" value="music">
                        Music & Art
                    </label>

                    <label>
                        <input type="checkbox" name="categories" value="sports">
                        Sports
                    </label>

                    <label>
                        <input type="checkbox" name="categories" value="food">
                        Food & Drink
                    </label>

                    <label>
                        <input type="checkbox" name="categories" value="outdoor">
                        Outdoor
                    </label>

                    <label>
                        <input type="checkbox" name="categories" value="technology">
                        Technology
                    </label>

                    <label>
                        <input type="checkbox" name="categories" value="community">
                        Community
                    </label>

                </div>

                <button type="submit" class="profile-save-btn">
                    Update
                </button>

            </form>

        </div>
    </div>

</main>

<script>
    // 🔥 TODO: connect to backend later
    const API_URL = "https://capstone-project-infinite-loop-f0nr.onrender.com/api/user/categories";

    document.getElementById("profileForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const selected = Array.from(
            document.querySelectorAll('input[name="categories"]:checked')
        ).map(cb => cb.value);

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ categories: selected })
            });

            if (!res.ok) throw new Error("Failed to update profile");

            alert("Profile updated successfully!");

        } catch (err) {
            console.error(err);
            alert("Error updating profile.");
        }
    });
</script>

</body>
</html>
